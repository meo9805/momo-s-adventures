<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="给堡堡的 520 月亮森林童话" />
    <meta name="theme-color" content="#16213e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="momo" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon-moon-v4.png?v=20260522-v7" />
    <link rel="apple-touch-icon-precomposed" sizes="180x180" href="./icons/apple-touch-icon-moon-v4.png?v=20260522-v7" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192-moon-v4.png?v=20260522-v7" />
    <title>momo 的月亮森林</title>
    <script type="module" crossorigin src="./assets/index-y369KnMo.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DNZeo2_7.css">
  </head>
  <body>
    <main id="app" aria-label="momo 的月亮森林">
      <section id="intro" class="intro" aria-label="开场">
        <div class="intro__content">
          <p class="eyebrow">520 / momo quest</p>
          <h1>momo 的月亮森林</h1>
          <p class="intro__copy">
            Nico 说今晚的月亮被藏起来了。轻轻进入森林，把小动物们守住的月光找回来。
          </p>
          <button id="start-button" class="button button--primary" type="button">进入月亮森林</button>
        </div>
      </section>

      <section class="shell" aria-label="互动童话">
        <header class="topbar">
          <div>
            <p class="topbar__label">狐狸 Nico 的 520 童话委托</p>
            <h2>momo 的月亮森林</h2>
          </div>
          <button id="sound-button" class="icon-button" type="button" aria-label="打开音乐">♪</button>
        </header>

        <div class="progress" aria-label="月亮碎片进度">
          <span id="stage-chip">第一章</span>
          <div class="progress__track">
            <div id="progress-fill" class="progress__fill"></div>
          </div>
          <span id="progress-text">0/5</span>
        </div>

        <div id="game-root" class="game-root" aria-label="游戏画面"></div>

        <section class="dialog" aria-live="polite">
          <div>
            <p id="dialog-title" class="dialog__title">Nico 的委托</p>
            <p id="dialog-text" class="dialog__text">轻点画面里的小动物和月光，或者按下面按钮慢慢把故事找回来。</p>
          </div>
          <button id="primary-action" class="button" type="button" disabled>继续</button>
        </section>
      </section>

      <section id="ending" class="ending" aria-label="最终告白" hidden>
        <div class="ending__moon" aria-hidden="true"></div>
        <p class="eyebrow">月亮回来了</p>
        <h2>给堡堡</h2>
        <div id="ending-lines" class="ending__lines"></div>
        <p class="ending__sign">猫猫头</p>
        <button id="restart-button" class="button button--primary" type="button">再走一遍森林</button>
      </section>
    </main>

  </body>
</html>
